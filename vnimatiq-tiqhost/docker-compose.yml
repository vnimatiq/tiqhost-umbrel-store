services:
  app_proxy:
    environment:
      APP_HOST: vnimatiq-tiqhost_tiqhost-ui_1
      APP_PORT: 80
    restart: on-failure

  tiqhost-ui:
    image: vnimatiq/tiqhost-ui:1.0.0
    container_name: vnimatiq-tiqhost_tiqhost-ui_1
    restart: on-failure
    depends_on:
      - tiqhost-api

  tiqhost-api:
    image: vnimatiq/tiqhost-api:1.0.0
    container_name: vnimatiq-tiqhost_tiqhost-api_1
    user: "root"
    restart: on-failure
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
